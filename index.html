<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemental Rogue - RLCV</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .card-hover:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .card-transition {
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }
        }

        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes damage {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-30px) scale(1.5);
            }
        }

        .damage-text {
            animation: damage 1s forwards;
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen overflow-hidden select-none">
    <div id="app" class="relative w-full h-screen flex flex-col">
        <!-- Start Screen -->
        <div id="start-screen"
            class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950 bg-opacity-95 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
            <h1
                class="text-6xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">
                ELEMENTAL ROGUE</h1>
            <p class="text-slate-400 mb-12 text-lg">Select your Spirit to begin.</p>

            <div class="flex gap-6 px-8 max-w-6xl w-full justify-center">
                <!-- Spirits will be injected here -->
                <div id="spirits-container" class="flex gap-6 w-full justify-center"></div>
            </div>
        </div>

        <!-- Battle Screen -->
        <div id="battle-screen"
            class="hidden flex-1 flex flex-col bg-gradient-to-b from-slate-900 to-slate-950 relative overflow-hidden min-h-0">

            <!-- Enemy Area (Top) -->
            <div class="h-1/3 w-full flex flex-col items-center justify-start pt-6 relative min-h-0">
                <div id="enemy-sprite"
                    class="w-32 h-32 rounded-full border-4 border-red-500/50 bg-red-950/50 flex items-center justify-center text-5xl shadow-[0_0_30px_rgba(239,68,68,0.3)] transition-transform duration-300 shrink-0">
                    👹
                </div>

                <div class="mt-4 flex flex-col items-center">
                    <h2 id="enemy-name" class="text-2xl font-bold text-red-400 drop-shadow-md">Enemy Name</h2>
                    <div class="flex gap-4 mt-2">
                        <div class="flex items-center bg-red-950/50 px-3 py-1 rounded-full border border-red-500/30">
                            <span class="text-red-400 mr-1">♥</span>
                            <span id="enemy-hp" class="font-bold">100/100</span>
                        </div>
                        <div class="flex items-center bg-blue-950/50 px-3 py-1 rounded-full border border-blue-500/30">
                            <span class="text-blue-400 mr-1">🛡</span>
                            <span id="enemy-shield" class="font-bold">0</span>
                        </div>
                        <div class="flex items-center bg-cyan-950/50 px-3 py-1 rounded-full border border-cyan-500/30">
                            <span class="text-cyan-400 mr-1">✧</span>
                            <span id="enemy-mana" class="font-bold">0</span>
                        </div>
                    </div>
                    <div id="enemy-buffs" class="flex gap-2 mt-2 h-6"></div>
                </div>

                <!-- Enemy Intent / Skills -->
                <div class="absolute right-8 top-8 w-64 flex flex-col gap-2">
                    <h3 class="text-xs text-slate-400 font-bold uppercase tracking-wider text-right mb-1">Enemy Skills
                    </h3>
                    <div id="enemy-skills" class="flex flex-col gap-2">
                        <!-- Skills injected here -->
                    </div>
                </div>
            </div>

            <!-- Battle Log (Middle) -->
            <div class="h-1/6 w-full flex justify-center items-end pb-2 min-h-0 shrink-0">
                <div
                    class="w-full max-w-3xl h-full p-4 glass rounded-xl overflow-hidden flex flex-col relative min-h-0">
                    <div class="text-xs font-bold text-slate-500 uppercase mb-2 shrink-0">Combat Log</div>
                    <div id="battle-log"
                        class="flex-1 flex flex-col gap-1 overflow-y-auto text-sm text-slate-300 font-mono scroll-smooth min-h-0 pb-2">
                        <!-- Logs injected here -->
                    </div>
                </div>
            </div>

            <!-- Player Area (Bottom) -->
            <div class="h-1/2 w-full flex flex-col justify-end relative pb-6 px-8 min-h-0">
                <!-- Status Bar -->
                <div class="flex justify-between items-end mb-4 shrink-0">
                    <div class="flex gap-4">
                        <div
                            class="flex items-center bg-green-950/50 px-4 py-2 rounded-full border border-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.1)]">
                            <span class="text-green-400 mr-2 text-xl">♥</span>
                            <span id="player-hp" class="font-bold text-lg">50/50</span>
                        </div>
                        <div
                            class="flex items-center bg-blue-950/50 px-4 py-2 rounded-full border border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                            <span class="text-blue-400 mr-2 text-xl">🛡</span>
                            <span id="player-shield" class="font-bold text-lg">0</span>
                        </div>
                    </div>

                    <div class="flex gap-6 items-center">
                        <!-- Deck / Discard / Exile Stats -->
                        <div class="flex gap-3 text-xs font-mono text-slate-400">
                            <div class="flex flex-col items-center">
                                <div>Deck</div>
                                <div id="deck-count" class="font-bold text-slate-200">10</div>
                            </div>
                            <div class="flex flex-col items-center">
                                <div>Discard</div>
                                <div id="discard-count" class="font-bold text-slate-200">0</div>
                            </div>
                            <div class="flex flex-col items-center">
                                <div>Exile</div>
                                <div id="exile-count" class="font-bold text-purple-400">0</div>
                            </div>
                        </div>

                        <div
                            class="flex items-center bg-yellow-950/50 px-5 py-2 rounded-full border border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.1)]">
                            <span class="text-yellow-400 mr-2 text-xl">⚡</span>
                            <span id="player-ap" class="font-bold text-xl">1</span>
                        </div>
                        <div
                            class="flex items-center bg-cyan-950/50 px-5 py-2 rounded-full border border-cyan-500/30 shadow-[0_0_15px_rgba(6,182,212,0.1)]">
                            <span class="text-cyan-400 mr-2 text-xl">✧</span>
                            <span id="player-mana" class="font-bold text-xl">3</span>
                        </div>

                        <button id="end-turn-btn"
                            class="ml-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3 px-8 rounded-full shadow-[0_0_20px_rgba(99,102,241,0.4)] transition-all transform hover:scale-105 active:scale-95 border border-indigo-400/50 disabled:opacity-50 disabled:cursor-not-allowed">
                            End Turn
                        </button>
                    </div>
                </div>

                <!-- Player Buffs -->
                <div id="player-buffs" class="flex gap-2 mb-2 h-6 shrink-0"></div>

                <!-- Hand Area -->
                <div id="hand-container"
                    class="flex justify-center items-end h-48 gap-[-20px] relative w-full shrink-0">
                    <!-- Cards injected here -->
                </div>
            </div>

            <!-- Turn Banner Overlay -->
            <div id="turn-banner"
                class="absolute inset-0 flex items-center justify-center z-40 pointer-events-none opacity-0 transition-opacity duration-300">
                <div
                    class="bg-black/80 w-full py-8 border-y border-white/10 flex items-center justify-center backdrop-blur-sm">
                    <h2 id="turn-banner-text" class="text-5xl font-black tracking-[0.2em] text-white">PLAYER TURN</h2>
                </div>
            </div>

        </div>

        <!-- Reward Screen -->
        <div id="reward-screen"
            class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/95 backdrop-blur-xl">
            <h1
                class="text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">
                VICTORY!</h1>
            <p class="text-slate-300 mb-8 text-xl">Steal one of the enemy's skills to add to your deck.</p>

            <div id="reward-cards" class="flex gap-6 mb-12">
                <!-- Cards injected here -->
            </div>

            <button id="skip-reward-btn"
                class="text-slate-400 hover:text-white transition-colors border-b border-slate-600 hover:border-white pb-1">
                Skip & Proceed
            </button>
        </div>

        <!-- Game Over / Game Clear Screen -->
        <div id="end-screen"
            class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/95 backdrop-blur-xl">
            <h1 id="end-title" class="text-6xl font-black mb-4 text-red-500">GAME OVER</h1>
            <button onclick="location.reload()"
                class="mt-8 bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-8 rounded-full border border-white/30 transition-all">
                Play Again
            </button>
        </div>

    </div>

    <script>
        const CARDS = {
            // 炎の精霊
            'hidane': { name: '火種', ap: 1, mana: 0, desc: '敵に3ダメージ。デッキに『火花』を3枚加える。', effect: (g) => { g.damageEnemy(3); g.addCardsToDeck('hibana', 3); } },
            'hibana': { name: '火花', ap: 0, mana: 0, keywords: ['sokkou', 'jogai'], desc: '敵に2ダメージ。使用後【除外】。', effect: (g) => { g.damageEnemy(2); } },
            'nainen': { name: '内燃', ap: 1, mana: 0, desc: 'デッキの『火花』を2枚【除外】。この戦闘中、攻撃の威力+2。', effect: (g) => { g.exileFromDeck('hibana', 2); g.player.buffs.atkBonus += 2; } },
            'daienjou': { name: '大炎上', ap: 1, mana: 0, desc: '10ダメージ。【除外】された自分のカード数×2の追加ダメージ。', effect: (g) => { let b = g.player.exile.length * 2; g.damageEnemy(10 + b); } },

            // 氷の精霊
            'hyou_manazashi': { name: '氷結の眼差し', ap: 1, mana: 0, desc: '敵のスキルを1枚【凍結（永続）】する。', effect: (g) => { g.freezeEnemySkill(); } },
            'hyou_shibari': { name: '氷晶の縛り', ap: 1, mana: 0, desc: '永続デバフ。敵のスキルが【凍結】されるたび、敵に3ダメージ。', effect: (g) => { g.enemy.debuffs.freezeDamage += 3; } },
            'shimoyake': { name: '霜焼け', ap: 1, mana: 0, desc: '5ダメージ。敵の【凍結】スキル数×2の追加ダメージ。', effect: (g) => { let count = g.enemy.skills.filter(s => s.frozen).length; g.damageEnemy(5 + count * 2); } },
            'hyousai': { name: '氷砕', ap: 1, mana: 0, desc: '敵の【凍結】をすべて解除。解除した枚数×4のダメージ。', effect: (g) => { let count = g.unfreezeEnemySkills(); g.damageEnemy(count * 4); } },

            // 雷の精霊
            'spark': { name: 'スパーク', ap: 1, mana: 0, desc: '2ダメージを2回。(手札が3枚でない時は【即効】)', effect: (g) => { g.damageEnemy(2); setTimeout(() => g.damageEnemy(2), 200); }, dynKey: (g) => g.player.hand.length !== 3 ? ['sokkou'] : [] },
            'enrai': { name: '遠雷', ap: 0, mana: 0, keywords: ['sokkou', 'jogai'], desc: 'このターン発動した【即効】カード数分マナを得る。', effect: (g) => { g.addMana(g.turnStats.sokkouCount); } },
            'jinrai_yocho': { name: '迅雷の予兆', ap: 1, mana: 0, desc: '次ターン開始時に3枚引く。(1マナ以上あるなら1マナ消費で【即効】)', effect: (g) => { g.player.buffs.nextTurnDraw += 3; }, dynCost: (g) => g.player.mana >= 1 ? { ap: 0, mana: 1 } : { ap: 1, mana: 0 }, dynKey: (g) => g.player.mana >= 1 ? ['sokkou'] : [] },
            'kadenryu': { name: '過電流', ap: 0, mana: 2, keywords: ['sokkou', 'jogai'], desc: 'このターン中、【即効】を使うたび全攻撃力+2。', effect: (g) => { g.player.buffs.sokkouAtkBuff = true; } },

            // 水の精霊
            'yusui': { name: '湧水', ap: 1, mana: 0, desc: 'この戦闘中、効果で得られるマナ+1。', effect: (g) => { g.player.buffs.manaGainBonus += 1; } },
            'shibuki': { name: '飛沫', ap: 1, mana: 0, desc: '1マナを2回得る。', effect: (g) => { g.addMana(1); setTimeout(() => g.addMana(1), 200); } },
            'dakuryu': { name: '濁流', ap: 1, mana: 0, desc: 'カードを2枚引く。(所持マナ5以上なら2マナ消費で【即効】)', effect: (g) => { g.drawCards(2); }, dynCost: (g) => g.player.mana >= 5 ? { ap: 0, mana: 2 } : { ap: 1, mana: 0 }, dynKey: (g) => g.player.mana >= 5 ? ['sokkou'] : [] },
            'ageshio': { name: '上げ潮', ap: 1, mana: 0, keywords: ['jogai'], desc: '所持マナを2倍にする。', effect: (g) => { g.addMana(g.player.mana); } },
            'daikekkai': { name: '大決壊', ap: 0, mana: 0, keywords: ['sokkou'], desc: '全マナを消費。敵に【消費マナ×5】のダメージ。', effect: (g) => { let m = g.player.mana; g.useMana(m); g.damageEnemy(m * 5); } },
            'uzushio': { name: '渦潮', ap: 1, mana: 2, desc: '相手がスキルを使うたび、【この発動時のマナ分】ダメージ。', effect: (g) => { g.enemy.debuffs.skillDamage += g.player.mana; } },
            'mizujunkan': { name: '水循環', ap: 1, mana: 0, keywords: ['jogai'], desc: '除外ゾーンからランダムに2枚手札に加える。', effect: (g) => { g.recoverFromExile(2); } },

            // 敵スキル
            'toge_kamae': { name: 'トゲの構え', isEnemy: true, ap: 1, mana: 0, desc: '永続バフ。相手が1ターンに2枚目以降のカードを使用するたび、相手に2ダメージ。', effect: (g) => { g.enemy.buffs.spikeDamage += 2; } },
            'needle_shot': { name: 'ニードルショット', isEnemy: true, ap: 1, mana: 0, desc: '1ダメージを4回与える。', effect: (g) => { for (let i = 0; i < 4; i++) setTimeout(() => g.damagePlayer(1), i * 200); } },
            'harisenbon': { name: 'ハリセンボン', isEnemy: true, keywords: ['sokkou'], ap: 0, mana: 2, desc: '盾6。ダメージを受けたら手札に『ニードルショット』を【複製】。', effect: (g) => { g.addEnemyShield(6); g.enemy.buffs.needleCounter = true; } },

            'bukimi_gyoushi': { name: '不気味な凝視', isEnemy: true, ap: 1, mana: 1, desc: '相手のランダムな手札1枚を【凍結】。', effect: (g) => { g.freezePlayerHandCard(1); } },
            'dappi': { name: '脱皮', isEnemy: true, ap: 1, mana: 0, desc: '自分の全デバフ・凍結を解除し、2回行動追加。', effect: (g) => { g.enemy.debuffs = {}; g.unfreezeEnemySkills(); g.enemy.extraActions += 1; } },
            'toguro': { name: 'とぐろを巻く', isEnemy: true, keywords: ['jogai'], ap: 1, mana: 0, desc: '次ターン開始時までダメージ0。次ターンはドロー不可。', effect: (g) => { g.enemy.buffs.invincible = true; g.enemy.buffs.skipNextDraw = true; } },

            'delay_tachyon': { name: 'ディレイ・タキオン', isEnemy: true, ap: 1, mana: 0, desc: '相手の手札2枚を永続凍結。', effect: (g) => { g.freezePlayerHandCard(2); } },
            'maryoku_osen': { name: '魔力汚染', isEnemy: true, ap: 1, mana: 0, desc: '相手のマナを半減。', effect: (g) => { g.player.mana = Math.floor(g.player.mana / 2); } },
            'shuen_kane': { name: '終焉の鐘', isEnemy: true, ap: 1, mana: 0, desc: '貫通999ダメージ。', effect: (g) => { g.damagePlayer(999, true); } },
        };

        const SPIRITS = [
            { id: 'fire', name: '炎の精霊', icon: '🔥', deck: ['hidane', 'hidane', 'hibana', 'hibana', 'nainen', 'daienjou'] },
            { id: 'ice', name: '氷の精霊', icon: '❄️', deck: ['hyou_manazashi', 'hyou_manazashi', 'hyou_shibari', 'shimoyake', 'shimoyake', 'hyousai'] },
            { id: 'lightning', name: '雷の精霊', icon: '⚡', deck: ['spark', 'spark', 'enrai', 'jinrai_yocho', 'kadenryu'] },
            { id: 'water', name: '水の精霊', icon: '🌊', deck: ['yusui', 'shibuki', 'shibuki', 'dakuryu', 'ageshio', 'daikekkai', 'uzushio', 'mizujunkan'] }
        ];

        const ENEMIES = [
            { id: 'e1', name: '針ネズミ', icon: '🐜', hp: 40, mana: 2, skills: ['toge_kamae', 'needle_shot', 'harisenbon'] },
            { id: 'e2', name: '脱皮ヘビ', icon: '🐍', hp: 55, mana: 3, skills: ['bukimi_gyoushi', 'dappi', 'toguro'] },
            { id: 'boss1', name: '終焉の時計', icon: '⏳', hp: 200, mana: 10, skills: ['delay_tachyon', 'delay_tachyon', 'maryoku_osen', 'shuen_kane'] }
        ];

        class GameState {
            constructor() {
                this.stageIndex = 0;
                this.player = { hp: 50, maxHp: 50, shield: 0, mana: 3, ap: 1, deck: [], hand: [], discard: [], exile: [], buffs: { atkBonus: 0, manaGainBonus: 0, nextTurnDraw: 0 }, debuffs: { passDamage: 0 } };
                this.enemy = null;
                this.turnStats = { sokkouCount: 0, cardsPlayed: 0 };
            }

            initPlayer(spiritId) {
                let s = SPIRITS.find(x => x.id === spiritId);
                this.player.deck = s.deck.map(id => ({ ...CARDS[id], uid: Math.random().toString(36).substr(2, 9) }));
                this.shuffleDeck();
            }

            shuffleDeck() {
                this.player.deck = this.player.deck.sort(() => Math.random() - 0.5);
            }

            setupEnemy(enemyData) {
                this.enemy = { ...enemyData, hp: enemyData.hp, maxHp: enemyData.hp, shield: 0, mana: enemyData.mana, skills: enemyData.skills.map(id => ({ ...CARDS[id], id, frozen: false })), buffs: { spikeDamage: 0 }, debuffs: { freezeDamage: 0, skillDamage: 0 }, extraActions: 0 };
                this.turnStats = { sokkouCount: 0, cardsPlayed: 0 };
                this.player.buffs = { atkBonus: 0, manaGainBonus: 0, nextTurnDraw: 0 };
                this.player.debuffs = { passDamage: 0 };

                // Shuffle all cards back
                this.player.deck = [...this.player.deck, ...this.player.hand, ...this.player.discard].sort(() => Math.random() - 0.5);
                this.player.hand = [];
                this.player.discard = [];
                this.player.exile = [];
            }

            drawCards(num) {
                for (let i = 0; i < num; i++) {
                    if (this.player.deck.length === 0) {
                        this.player.deck = [...this.player.discard].sort(() => Math.random() - 0.5);
                        this.player.discard = [];
                    }
                    if (this.player.deck.length > 0) {
                        this.player.hand.push(this.player.deck.pop());
                    }
                }
            }

            damageEnemy(amt) {
                amt += this.player.buffs.atkBonus || 0;
                if (this.player.buffs.sokkouAtkBuff) amt += 2;
                if (this.enemy.buffs.invincible) amt = 0;

                if (this.enemy.shield >= amt) {
                    this.enemy.shield -= amt;
                } else {
                    let d = amt - this.enemy.shield;
                    this.enemy.shield = 0;
                    this.enemy.hp -= d;
                }
                log(`敵に ${amt} ダメージ！`);
                ui.update();
                checkDeath();
            }

            damagePlayer(amt, pierce = false) {
                if (!pierce && this.player.shield >= amt) {
                    this.player.shield -= amt;
                } else {
                    let d = pierce ? amt : amt - this.player.shield;
                    if (!pierce) this.player.shield = 0;
                    this.player.hp -= d;
                }
                log(`プレイヤーに ${amt} ダメージ！`);
                ui.update();
                checkDeath();
            }

            addMana(amt) {
                amt += this.player.buffs.manaGainBonus || 0;
                this.player.mana += amt;
                log(`マナを ${amt} 回復`);
                ui.update();
            }

            useMana(amt) {
                this.player.mana = Math.max(0, this.player.mana - amt);
                ui.update();
            }

            addEnemyShield(amt) {
                this.enemy.shield += amt;
                log(`敵がシールド ${amt} を得た`);
                ui.update();
            }

            freezeEnemySkill() {
                let unfrozen = this.enemy.skills.filter(s => !s.frozen);
                if (unfrozen.length > 0) {
                    let target = unfrozen[Math.floor(Math.random() * unfrozen.length)];
                    target.frozen = true;
                    log(`敵のスキル『${target.name}』を凍結！`);
                    if (this.enemy.debuffs.freezeDamage > 0) this.damageEnemy(this.enemy.debuffs.freezeDamage);
                    ui.update();
                }
            }

            unfreezeEnemySkills() {
                let count = 0;
                this.enemy.skills.forEach(s => { if (s.frozen) { s.frozen = false; count++; } });
                ui.update();
                return count;
            }

            freezePlayerHandCard(num) {
                let unfrozen = this.player.hand.filter(c => !(c.frozen || false));
                for (let i = 0; i < num && unfrozen.length > 0; i++) {
                    let target = unfrozen[Math.floor(Math.random() * unfrozen.length)];
                    target.frozen = true;
                    unfrozen = unfrozen.filter(c => c !== target);
                    log(`手札の『${target.name}』が凍結された！`);
                }
                ui.update();
            }

            addCardsToDeck(cardId, num) {
                for (let i = 0; i < num; i++) this.player.deck.push({ ...CARDS[cardId], uid: Math.random().toString(36).substr(2, 9) });
                this.shuffleDeck();
                ui.update();
            }

            exileFromDeck(cardId, num) {
                let count = 0;
                this.player.deck = this.player.deck.filter(c => {
                    if (c.id === cardId && count < num) {
                        this.player.exile.push(c);
                        count++;
                        return false;
                    }
                    return true;
                });
                log(`デッキから ${count} 枚を除外`);
                ui.update();
            }

            recoverFromExile(num) {
                for (let i = 0; i < num; i++) {
                    if (this.player.exile.length > 0) {
                        let c = this.player.exile.splice(Math.floor(Math.random() * this.player.exile.length), 1)[0];
                        this.player.hand.push(c);
                    }
                }
                ui.update();
            }
        }

        const game = new GameState();

        function log(msg) {
            let logEl = document.getElementById('battle-log');
            let item = document.createElement('div');
            item.className = 'py-1 border-b border-white/5 opacity-0 translate-y-2 transition-all';
            item.innerHTML = `<span class="text-slate-500 mr-2">></span>${msg}`;
            logEl.appendChild(item);
            setTimeout(() => { item.classList.remove('opacity-0', 'translate-y-2'); }, 10);
            logEl.scrollTop = logEl.scrollHeight;
        }

        const ui = {
            update: () => {
                // Enemy
                if (game.enemy) {
                    document.getElementById('enemy-name').innerText = game.enemy.name;
                    document.getElementById('enemy-sprite').innerText = game.enemy.icon;
                    document.getElementById('enemy-hp').innerText = `${Math.floor(game.enemy.hp)}/${game.enemy.maxHp}`;
                    document.getElementById('enemy-shield').innerText = game.enemy.shield;
                    document.getElementById('enemy-mana').innerText = game.enemy.mana;

                    let skillsHtml = game.enemy.skills.map(s =>
                        `<div class="text-sm px-2 py-1 bg-slate-800/80 rounded border ${s.frozen ? 'border-cyan-500 text-cyan-300' : 'border-slate-700 text-slate-300'} flex justify-between">
                            <span>${s.name}</span>
                            <span class="text-xs ${s.frozen ? '' : 'hidden'}">❄️ Frozen</span>
                        </div>`
                    ).join('');
                    document.getElementById('enemy-skills').innerHTML = skillsHtml;
                }

                // Player
                document.getElementById('player-hp').innerText = `${Math.floor(game.player.hp)}/${game.player.maxHp}`;
                document.getElementById('player-shield').innerText = game.player.shield;
                document.getElementById('player-ap').innerText = game.player.ap;
                document.getElementById('player-mana').innerText = game.player.mana;

                document.getElementById('deck-count').innerText = game.player.deck.length;
                document.getElementById('discard-count').innerText = game.player.discard.length;
                document.getElementById('exile-count').innerText = game.player.exile.length;

                // Hand
                let handHtml = game.player.hand.map((c, i) => {
                    let cost = c.dynCost ? c.dynCost(game) : { ap: c.ap, mana: c.mana };
                    let keys = c.dynKey ? c.dynKey(game) : (c.keywords || []);
                    let isSokkou = keys.includes('sokkou');
                    let canPlay = game.player.mana >= cost.mana && (isSokkou || game.player.ap >= cost.ap) && !(c.frozen || false);

                    return `
                    <div onclick="playCard(${i})" class="card-transition card-hover w-36 h-48 bg-gradient-to-br from-slate-800 to-slate-900 border ${canPlay ? 'border-indigo-500 cursor-pointer shadow-[0_0_10px_rgba(99,102,241,0.3)]' : 'border-slate-700 opacity-50 cursor-not-allowed'} rounded-xl p-3 flex flex-col justify-between -ml-4 first:ml-0 relative ${c.frozen ? 'border-cyan-500/50' : ''}">
                        ${c.frozen ? '<div class="absolute inset-0 bg-cyan-900/40 rounded-xl flex items-center justify-center pointer-events-none text-4xl">❄️</div>' : ''}
                        <div>
                            <div class="text-xs font-bold ${isSokkou ? 'text-yellow-400' : 'text-slate-300'}">${c.name}</div>
                            <div class="flex gap-1 mt-1 text-[10px]">
                                ${!isSokkou ? `<span class="bg-yellow-900/50 text-yellow-400 px-1 rounded border border-yellow-500/30">⚡${cost.ap}</span>` : `<span class="bg-green-900/50 text-green-400 px-1 rounded border border-green-500/30">即効</span>`}
                                <span class="bg-cyan-900/50 text-cyan-400 px-1 rounded border border-cyan-500/30">✧${cost.mana}</span>
                            </div>
                        </div>
                        <div class="text-[10px] text-slate-400 mt-2 leading-tight flex-1 overflow-hidden">${c.desc}</div>
                    </div>`;
                }).join('');
                document.getElementById('hand-container').innerHTML = handHtml;
            }
        };

        function startGame(spiritId) {
            game.initPlayer(spiritId);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('battle-screen').classList.remove('hidden');
            startBattle(ENEMIES[game.stageIndex]);
        }

        function startBattle(enemyData) {
            game.setupEnemy(enemyData);
            game.player.mana = 3;
            game.turn = 1;
            game.player.shield = 0;
            log(`=== VS ${game.enemy.name} ===`);
            startPlayerTurn();
        }

        function startPlayerTurn() {
            game.player.shield = 0;

            if (!game.turn) game.turn = 1;
            if (game.turn === 1) {
                game.player.ap = 2; // 1ターン目のみ2回
            } else {
                game.player.ap += 1; // その後は1回（持ち越し）
            }
            game.turn++;

            game.player.mana = 3; // reset to 3 base

            // Draw
            let drawCount = 5 - game.player.hand.length + (game.player.buffs.nextTurnDraw || 0);
            game.player.buffs.nextTurnDraw = 0;
            game.drawCards(Math.max(1, drawCount));

            showBanner('PLAYER TURN');
            ui.update();
        }

        function playCard(index) {
            let c = game.player.hand[index];
            if (!c || c.frozen) return;

            let cost = c.dynCost ? c.dynCost(game) : { ap: c.ap, mana: c.mana };
            let keys = c.dynKey ? c.dynKey(game) : (c.keywords || []);
            let isSokkou = keys.includes('sokkou');

            if (game.player.mana < cost.mana) return;
            if (!isSokkou && game.player.ap < cost.ap) return;

            // Consume
            game.useMana(cost.mana);
            if (!isSokkou) game.player.ap -= cost.ap;

            // Stats
            game.turnStats.cardsPlayed++;
            if (isSokkou) game.turnStats.sokkouCount++;

            // Effect
            log(`▶ プレイヤーは『${c.name}』を使用した！`);
            c.effect(game);

            // Enemy reacts
            if (game.enemy.buffs.spikeDamage > 0 && game.turnStats.cardsPlayed >= 2) {
                game.damagePlayer(game.enemy.buffs.spikeDamage);
            }
            if (game.enemy.debuffs.skillDamage > 0) {
                game.damageEnemy(game.enemy.debuffs.skillDamage);
            }

            // Remove from hand
            game.player.hand.splice(index, 1);
            if (keys.includes('jogai')) {
                game.player.exile.push(c);
            } else {
                game.player.discard.push(c);
            }

            ui.update();
        }

        document.getElementById('end-turn-btn').addEventListener('click', () => {
            if (game.player.hp <= 0) return;

            // Discard unheld cards
            game.player.hand = game.player.hand.filter(c => {
                let keys = c.dynKey ? c.dynKey(game) : (c.keywords || []);
                if (keys.includes('hoji')) return true;
                game.player.discard.push(c);
                return false;
            });

            if (game.player.debuffs.passDamage > 0 && game.turnStats.cardsPlayed === 0) {
                game.damagePlayer(game.player.debuffs.passDamage);
            }

            ui.update();
            startEnemyTurn();
        });

        async function startEnemyTurn() {
            document.getElementById('end-turn-btn').disabled = true;
            showBanner('ENEMY TURN');
            game.enemy.shield = 0;
            ui.update();

            await new Promise(r => setTimeout(r, 1000));

            let actions = 1 + game.enemy.extraActions;
            game.enemy.extraActions = 0;

            for (let a = 0; a < actions; a++) {
                if (game.enemy.hp <= 0) break;

                for (let s of game.enemy.skills) {
                    if (game.enemy.hp <= 0) break;
                    if (s.frozen) continue;

                    if (game.enemy.mana >= s.mana) {
                        game.enemy.mana -= s.mana;
                        log(`◀ 敵は『${s.name}』を使用した！`);
                        s.effect(game);
                        ui.update();
                        await new Promise(r => setTimeout(r, 1000));
                        if (s.ap > 0) break; // End action if it uses AP
                    }
                }
            }

            if (game.player.hp > 0 && game.enemy.hp > 0) {
                document.getElementById('end-turn-btn').disabled = false;
                startPlayerTurn();
            }
        }

        function checkDeath() {
            if (game.player.hp <= 0) {
                document.getElementById('end-title').innerText = 'GAME OVER';
                document.getElementById('end-screen').classList.remove('hidden');
            } else if (game.enemy && game.enemy.hp <= 0) {
                log(`敵を倒した！`);
                document.getElementById('end-turn-btn').disabled = true;
                setTimeout(showReward, 1000);
            }
        }

        function showReward() {
            let screen = document.getElementById('reward-screen');
            screen.classList.remove('hidden');

            let html = game.enemy.skills.map(s => `
                <div onclick="takeSkill('${s.id}')" class="card-hover cursor-pointer w-48 h-64 bg-slate-800 border border-indigo-500 rounded-xl p-4 flex flex-col">
                    <div class="text-sm font-bold text-slate-200 mb-2">${s.name}</div>
                    <div class="flex gap-2 text-xs mb-4">
                        <span class="bg-yellow-900/50 text-yellow-400 px-1 rounded">⚡${s.ap}</span>
                        <span class="bg-cyan-900/50 text-cyan-400 px-1 rounded">✧${s.mana}</span>
                    </div>
                    <div class="text-sm text-slate-400 flex-1">${s.desc}</div>
                    <div class="text-center mt-2 bg-indigo-600 rounded py-1 text-sm text-white font-bold">Steal Skill</div>
                </div>
            `).join('');
            document.getElementById('reward-cards').innerHTML = html;
        }

        function takeSkill(id) {
            game.player.deck.push({ ...CARDS[id], uid: Math.random().toString(36).substr(2, 9) });
            nextStage();
        }

        document.getElementById('skip-reward-btn').addEventListener('click', nextStage);

        function nextStage() {
            document.getElementById('reward-screen').classList.add('hidden');
            game.stageIndex++;
            if (game.stageIndex >= ENEMIES.length) {
                document.getElementById('end-title').innerText = 'GAME CLEAR!!';
                document.getElementById('end-title').className = 'text-6xl font-black mb-4 text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.8)]';
                document.getElementById('end-screen').classList.remove('hidden');
            } else {
                document.getElementById('end-turn-btn').disabled = false;
                startBattle(ENEMIES[game.stageIndex]);
            }
        }

        function showBanner(text) {
            let b = document.getElementById('turn-banner');
            document.getElementById('turn-banner-text').innerText = text;
            b.classList.remove('opacity-0');
            setTimeout(() => b.classList.add('opacity-0'), 1500);
        }

        // Init Spirits UI
        window.onload = () => {
            let html = SPIRITS.map(s => `
                <div onclick="startGame('${s.id}')" class="card-hover cursor-pointer w-64 h-80 glass rounded-2xl p-6 flex flex-col items-center justify-center border-t border-white/20 hover:border-indigo-400 hover:bg-white/10 group">
                    <div class="text-6xl mb-4 group-hover:scale-110 transition-transform">${s.icon}</div>
                    <h3 class="text-2xl font-bold text-white mb-2">${s.name}</h3>
                    <p class="text-sm text-slate-400 text-center">Click to select and start the battle.</p>
                </div>
            `).join('');
            document.getElementById('spirits-container').innerHTML = html;
        };
    </script>
</body>

</html>
