<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemental Rogue - RLCV</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');

        :root { color-scheme: dark; }
        html, body { margin: 0; padding: 0; width: 100%; }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            overscroll-behavior: none;
            touch-action: manipulation;
        }
        #app { width: 100%; height: 100dvh; min-height: 100dvh; }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .card-hover:hover { transform: translateY(-8px) scale(1.04); box-shadow: 0 12px 24px rgba(0,0,0,0.6); z-index: 10; }
        .card-transition { transition: all 0.18s cubic-bezier(0.25, 0.8, 0.25, 1); }

        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
        .animate-shake { animation: shake 0.25s ease-in-out; }

        @keyframes damage { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-30px) scale(1.5)} }
        .damage-text { animation: damage 1s forwards; }

        @keyframes pulse-glow { 0%,100%{box-shadow:0 0 10px rgba(239,68,68,0.3)} 50%{box-shadow:0 0 25px rgba(239,68,68,0.7)} }
        .enemy-pulse { animation: pulse-glow 2s ease-in-out infinite; }

        /* HP bars */
        .hp-bar-track { background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
        .hp-bar-fill { border-radius: 4px; transition: width 0.4s ease; }

        /* ==========================================
           UI MODE SPECIFIC CSS
           ========================================== */

        /* --- UI MODE 1: 縦並びシンプルUI --- */
        .ui-mode-1 #battle-screen > div.flex-1 {
            flex-direction: column !important;
            align-items: center;
            overflow-y: auto;
            gap: 16px;
            padding-top: 10px;
        }
        .ui-mode-1 #battle-screen .w-56 {
            width: 100% !important;
            max-width: 24rem !important;
            flex-shrink: 0 !important;
            padding-top: 0 !important;
        }
        .ui-mode-1 #player-sprite, 
        .ui-mode-1 #enemy-sprite {
            width: 48px !important;
            height: 48px !important;
            font-size: 20px !important;
            margin-bottom: 4px !important;
        }
        .ui-mode-1 #battle-log-container {
            width: 100% !important;
            max-width: 24rem !important;
            height: 180px !important;
            margin: 0 !important;
            flex: none !important;
        }
        .ui-mode-1 #hand-container {
            height: auto !important;
            flex-wrap: wrap;
            gap: 8px !important;
            justify-content: center;
            align-items: center;
        }
        .ui-mode-1 #battle-screen > div:nth-child(3) {
            height: auto !important;
            padding-bottom: 20px;
        }

        /* --- UI MODE 2: 今のUI (3カラム・デフォルト) --- */
        /* 特別な上書きは不要 */

        /* --- UI MODE 3: 改善案 (Slay the Spire バトルフィールド) --- */
        .ui-mode-3 #battle-log-container {
            position: fixed !important;
            top: 60px !important;
            right: 0 !important;
            bottom: 180px !important;
            width: 320px !important;
            background: rgba(10, 15, 30, 0.95) !important;
            border-left: 1px solid rgba(99, 102, 241, 0.2) !important;
            border-top: 1px solid rgba(99, 102, 241, 0.2) !important;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2) !important;
            border-radius: 16px 0 0 16px !important;
            z-index: 50 !important;
            box-shadow: -10px 0 30px rgba(0,0,0,0.7) !important;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            margin: 0 !important;
        }
        .ui-mode-3 #battle-log-container.log-open {
            transform: translateX(0) !important;
        }
        .ui-mode-3 #battle-screen > div.flex-1 {
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
            align-items: center !important;
            justify-items: center !important;
            position: relative;
            padding: 0 40px !important;
        }
        .ui-mode-3 #battle-screen .w-56 {
            width: auto !important;
            flex-shrink: 1 !important;
            align-items: center !important;
            justify-content: center !important;
            padding-top: 0 !important;
        }
        .ui-mode-3 #battle-screen .w-56 .glass {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 4px !important;
        }
        .ui-mode-3 #player-sprite,
        .ui-mode-3 #enemy-sprite {
            width: 130px !important;
            height: 130px !important;
            font-size: 60px !important;
            border-radius: 30px !important;
            border: 4px solid rgba(255,255,255,0.1) !important;
            background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, rgba(0,0,0,0.4) 100%) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(99,102,241,0.2) !important;
            margin-bottom: 16px !important;
            transition: all 0.3s ease;
        }
        .ui-mode-3 #enemy-sprite {
            background: radial-gradient(circle, rgba(239,68,68,0.2) 0%, rgba(0,0,0,0.4) 100%) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(239,68,68,0.2) !important;
        }
        .ui-mode-3 #end-turn-btn {
            position: absolute !important;
            right: 40px !important;
            bottom: 200px !important;
            margin-top: 0 !important;
            z-index: 30;
        }
        .ui-mode-3 #hand-container {
            perspective: 800px;
        }
        .ui-mode-3 #hand-container > div {
            margin-left: -20px !important;
            margin-right: -20px !important;
            transform-origin: bottom center;
        }

        /* --- UI MODE 4: index_old_31 風レイアウト --- */
        .ui-mode-4 #battle-screen {
            padding: 0 !important;
        }
        .ui-mode-4 .battle-main {
            display: flex !important;
            flex-direction: column !important;
        }
        .ui-mode-4 .enemy-area {
            height: 33.3333% !important;
            min-height: 220px !important;
        }
        .ui-mode-4 #battle-log-container {
            height: 16.6667% !important;
            min-height: 140px !important;
            margin: 0 !important;
            padding: 0 24px 8px !important;
        }
        .ui-mode-4 .player-area {
            height: 50% !important;
            min-height: 280px !important;
        }
        .ui-mode-4 #enemy-sprite {
            width: 112px !important;
            height: 112px !important;
            font-size: 44px !important;
            border-width: 4px !important;
            border-radius: 9999px !important;
            box-shadow: 0 0 28px rgba(239,68,68,0.3) !important;
        }
        .ui-mode-4 #battle-log-container .glass {
            border-radius: 16px !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05) !important;
        }
        .ui-mode-4 #end-turn-btn {
            border-radius: 9999px !important;
            padding: 0.75rem 1.5rem !important;
            margin-left: 1rem !important;
        }
        .ui-mode-4 #energy-crystal,
        .ui-mode-4 #log-toggle-btn,
        .ui-mode-4 #log-close-btn {
            display: none !important;
        }

        @media (max-width: 768px) {
            html, body, #app {
                height: 100dvh !important;
                min-height: 100dvh !important;
            }
            body {
                overflow: hidden;
            }
            #start-screen, #enemy-select-screen, #reward-screen, #end-screen {
                padding: 1rem;
                overflow-y: auto;
            }
            #start-screen h1 {
                font-size: clamp(2rem, 10vw, 3.25rem) !important;
            }
            #enemy-select-screen h1 {
                font-size: clamp(1.8rem, 7vw, 2.6rem) !important;
            }
            #enemy-select-container {
                padding: 0 0.5rem !important;
                gap: 0.75rem !important;
            }
            #enemy-select-container > div {
                width: min(100%, 18rem) !important;
            }
            .ui-mode-4 #battle-screen {
                height: 100dvh !important;
                min-height: 100dvh !important;
            }
            .ui-mode-4 .battle-main {
                min-height: 0 !important;
            }
            .ui-mode-4 .enemy-area {
                height: auto !important;
                min-height: 0 !important;
                padding-top: 0.75rem !important;
                padding-bottom: 0.75rem !important;
            }
            .ui-mode-4 .enemy-area > .absolute {
                position: static !important;
                width: min(100%, 20rem) !important;
                margin-top: 0.75rem !important;
                padding: 0 1rem !important;
            }
            .ui-mode-4 #battle-log-container {
                height: auto !important;
                min-height: 140px !important;
                max-height: 32vh !important;
                padding: 0 0.75rem 0.5rem !important;
            }
            .ui-mode-4 .player-area {
                height: auto !important;
                min-height: 0 !important;
                padding: 0.75rem 0.75rem 1rem !important;
            }
            .ui-mode-4 .player-area > .flex.justify-between.items-end.mb-4 {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 0.75rem !important;
            }
            .ui-mode-4 .player-area > .flex.justify-between.items-end.mb-4 > .flex.gap-4.flex-wrap {
                justify-content: center !important;
            }
            .ui-mode-4 .player-area > .flex.justify-between.items-end.mb-4 > .flex.gap-6.items-center.flex-wrap.justify-end {
                justify-content: flex-start !important;
                align-items: flex-start !important;
                gap: 0.75rem !important;
            }
            .ui-mode-4 #end-turn-btn {
                width: 100% !important;
                margin-left: 0 !important;
                margin-top: 0.25rem !important;
                padding: 0.8rem 1rem !important;
            }
            .ui-mode-4 #hand-container {
                height: auto !important;
                min-height: 7.5rem !important;
                flex-wrap: wrap !important;
                gap: 0.5rem !important;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                padding-bottom: 0.25rem !important;
            }
            .ui-mode-4 #turn-banner h2 {
                font-size: clamp(1.5rem, 6vw, 2.25rem) !important;
                letter-spacing: 0.12em !important;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen overflow-hidden select-none">
<div id="app" class="relative w-full h-screen flex flex-col">

    <!-- ===== START SCREEN ===== -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
        <h1 class="text-7xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400 drop-shadow-[0_0_20px_rgba(34,211,238,0.4)]">ELEMENTAL ROGUE</h1>
        <p class="text-slate-500 mb-14 text-base tracking-widest uppercase">Choose your spirit</p>
        <div id="spirits-container" class="flex gap-6 w-full justify-center px-8 max-w-5xl"></div>
    </div>

    <!-- ===== ENEMY SELECT SCREEN ===== -->
    <div id="enemy-select-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black overflow-y-auto py-10">
        <div class="flex flex-col items-center mb-8">
            <p class="text-slate-500 text-xs uppercase tracking-widest mb-2" id="enemy-select-progress"></p>
            <h1 class="text-5xl font-black mb-1 text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-400">SELECT OPPONENT</h1>
            <p class="text-slate-500 text-sm">3体の中から1体を選んで戦闘開始</p>
        </div>
        <div id="enemy-select-container" class="flex gap-5 px-8 max-w-5xl w-full justify-center flex-wrap"></div>
    </div>

    <!-- ===== BATTLE SCREEN ===== -->
    <div id="battle-screen" class="hidden flex-1 flex flex-col bg-gradient-to-b from-slate-900 via-slate-920 to-slate-950 relative overflow-hidden" style="min-height:0">
        <div class="battle-main flex-1 flex flex-col min-h-0 relative">
            <div class="enemy-area h-1/3 w-full flex flex-col items-center justify-start pt-6 relative min-h-0">
                <div id="enemy-sprite" class="w-32 h-32 rounded-full border-4 border-red-500/50 bg-red-950/50 flex items-center justify-center text-5xl shadow-[0_0_30px_rgba(239,68,68,0.3)] transition-transform duration-300 shrink-0">👹</div>

                <div class="mt-4 flex flex-col items-center">
                    <h2 id="enemy-name" class="text-2xl font-bold text-red-400 drop-shadow-md">Enemy</h2>
                    <div class="flex gap-4 mt-2 flex-wrap justify-center">
                        <div class="flex items-center bg-red-950/50 px-3 py-1 rounded-full border border-red-500/30">
                            <span class="text-red-400 mr-1">♥</span>
                            <span id="enemy-hp" class="font-bold">100/100</span>
                        </div>
                        <div class="flex items-center bg-blue-950/50 px-3 py-1 rounded-full border border-blue-500/30">
                            <span class="text-blue-400 mr-1">🛡</span>
                            <span id="enemy-shield" class="font-bold">0</span>
                        </div>
                        <div class="flex items-center bg-cyan-950/50 px-3 py-1 rounded-full border border-cyan-500/30">
                            <span class="text-cyan-400 mr-1">✧</span>
                            <span id="enemy-mana" class="font-bold">0</span>
                        </div>
                    </div>
                    <div id="enemy-buffs" class="flex gap-2 mt-2 h-6 flex-wrap justify-center"></div>
                </div>

                <div class="absolute right-8 top-8 w-64 flex flex-col gap-2">
                    <h3 class="text-xs text-slate-400 font-bold uppercase tracking-wider text-right mb-1">Enemy Skills</h3>
                    <div id="enemy-skills" class="flex flex-col gap-2"></div>
                </div>
            </div>

            <div id="battle-log-container" class="h-1/6 w-full flex justify-center items-end pb-2 min-h-0 shrink-0 px-6">
                <div class="w-full max-w-3xl h-full p-4 glass rounded-xl overflow-hidden flex flex-col relative min-h-0">
                    <div class="text-xs font-bold text-slate-500 uppercase mb-2 shrink-0">Combat Log</div>
                    <div id="battle-log" class="flex-1 flex flex-col gap-1 overflow-y-auto text-sm text-slate-300 font-mono scroll-smooth min-h-0 pb-2"></div>
                </div>
            </div>

            <div class="player-area h-1/2 w-full flex flex-col justify-end relative pb-6 px-8 min-h-0">
                <div class="flex justify-between items-end mb-4 shrink-0">
                    <div class="flex gap-4 flex-wrap">
                        <div class="flex items-center bg-green-950/50 px-4 py-2 rounded-full border border-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.1)]">
                            <span class="text-green-400 mr-2 text-xl">♥</span>
                            <span id="player-hp" class="font-bold text-lg">50/50</span>
                        </div>
                        <div class="flex items-center bg-blue-950/50 px-4 py-2 rounded-full border border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                            <span class="text-blue-400 mr-2 text-xl">🛡</span>
                            <span id="player-shield" class="font-bold text-lg">0</span>
                        </div>
                    </div>

                    <div class="flex gap-6 items-center flex-wrap justify-end">
                        <div class="flex gap-3 text-xs font-mono text-slate-400">
                            <div class="flex flex-col items-center">
                                <div>Deck</div>
                                <div id="deck-count" class="font-bold text-slate-200">10</div>
                            </div>
                            <div class="flex flex-col items-center">
                                <div>Discard</div>
                                <div id="discard-count" class="font-bold text-slate-200">0</div>
                            </div>
                            <div class="flex flex-col items-center">
                                <div>Exile</div>
                                <div id="exile-count" class="font-bold text-purple-400">0</div>
                            </div>
                        </div>

                        <div class="flex items-center bg-yellow-950/50 px-5 py-2 rounded-full border border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.1)]">
                            <span class="text-yellow-400 mr-2 text-xl">⚡</span>
                            <span id="player-ap" class="font-bold text-xl">1</span>
                        </div>
                        <div class="flex items-center bg-cyan-950/50 px-5 py-2 rounded-full border border-cyan-500/30 shadow-[0_0_15px_rgba(6,182,212,0.1)]">
                            <span class="text-cyan-400 mr-2 text-xl">✧</span>
                            <span id="player-mana" class="font-bold text-xl">3</span>
                        </div>

                        <button id="end-turn-btn" class="ml-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3 px-8 rounded-full shadow-[0_0_20px_rgba(99,102,241,0.4)] transition-all transform hover:scale-105 active:scale-95 border border-indigo-400/50 disabled:opacity-50 disabled:cursor-not-allowed">
                            End Turn
                        </button>
                    </div>
                </div>

                <div id="player-buffs" class="flex gap-2 mb-2 h-6 shrink-0 flex-wrap"></div>
                <div id="hand-container" class="flex justify-center items-end h-48 gap-[-20px] relative w-full shrink-0"></div>
            </div>

            <div id="turn-banner" class="absolute inset-0 flex items-center justify-center z-40 pointer-events-none opacity-0 transition-opacity duration-300">
                <div class="bg-black/80 w-full py-8 border-y border-white/10 flex items-center justify-center backdrop-blur-sm">
                    <h2 id="turn-banner-text" class="text-5xl font-black tracking-[0.2em] text-white">PLAYER TURN</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== REWARD SCREEN ===== -->
    <div id="reward-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/95 backdrop-blur-xl">
        <div class="text-xs text-yellow-500/70 uppercase tracking-widest mb-3" id="reward-subtitle">Victory!</div>
        <h1 class="text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.4)]">SPOILS OF WAR</h1>
        <p class="text-slate-400 mb-8 text-base">敵のスキルを1枚デッキに加えよう</p>
        <div id="reward-cards" class="flex gap-5 mb-10 flex-wrap justify-center px-4"></div>
        <button id="skip-reward-btn" class="text-slate-500 hover:text-slate-300 transition-colors text-sm border-b border-slate-700 hover:border-slate-400 pb-0.5">スキップして次へ</button>
    </div>

    <!-- ===== END SCREEN ===== -->
    <div id="end-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/95 backdrop-blur-xl">
        <h1 id="end-title" class="text-7xl font-black mb-6 text-red-500">GAME OVER</h1>
        <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-10 rounded-full border border-white/20 transition-all hover:scale-105">Play Again</button>
    </div>

</div>
<script>
    // ==========================================
    //  UI MODE SELECTOR
    //  1: さっきのUI (旧縦並びレイアウト)
    //  2: 今のUI (3カラム・ダッシュボード風)
    //  3: 改善案UI (本格的なSlay the Spire風バトルフィールド)
    //  4: index_old_31 風レイアウト
    // ==========================================
    const UI_MODE = 4;

    // ========================
    //  CARD DEFINITIONS
    // ========================
    const CARDS = {
        // 炎
        'hidane':      { name:'火種',        ap:1, mana:0, desc:'敵に3ダメ。デッキに火花×3追加。',                           effect: g => { g.damageEnemy(3); g.addCardsToDeck('hibana',3); } },
        'hibana':      { name:'火花',        ap:0, mana:0, keywords:['sokkou','jogai'], desc:'敵に2ダメ。除外。',          effect: g => { g.damageEnemy(2); } },
        'nainen':      { name:'内燃',        ap:1, mana:0, desc:'火花2枚除外。攻撃力+2(永続)。',                         effect: g => { g.exileFromDeck('hibana',2); g.player.buffs.atkBonus += 2; log('▶ 攻撃力 +2！'); } },
        'daienjou':    { name:'大炎上',      ap:1, mana:2, desc:'10ダメ＋除外済カード数×2。',                            effect: g => { g.damageEnemy(10 + g.player.exile.length*2); } },
        // 氷
        'hyou_manazashi':{ name:'氷結の眼差し', ap:1, mana:0, desc:'敵手札1枚を凍結。',                                   effect: g => { g.freezeEnemyHandCard(1); } },
        'hyou_shibari':  { name:'氷晶の縛り',   ap:1, mana:0, desc:'凍結するたび敵に3ダメ(永続)。',                       effect: g => { g.enemy.debuffs.freezeDamage += 3; } },
        'shimoyake':     { name:'霜焼け',        ap:1, mana:0, desc:'5ダメ＋凍結数×2。',                                 effect: g => { g.damageEnemy(5 + g.countEnemyFrozenCards()*2); } },
        'hyousai':       { name:'氷砕',          ap:1, mana:0, desc:'敵凍結を全解除。解除数×4ダメ。',                    effect: g => { let n=g.unfreezeEnemyCards(); g.damageEnemy(n*4); } },
        // 雷

    class GameState {
        constructor() {
            this.stageIndex = 0;  // 0-6: 通常戦, 7+: ボス
            this.defeatedEnemies = new Set();
            this.player = {
                hp:50, maxHp:50, shield:0, mana:3, ap:1,
                deck:[], hand:[], discard:[], exile:[],
                buffs:{ atkBonus:0, manaGainBonus:0, nextTurnDraw:0, sokkouAtkBuff:false },
                debuffs:{ passDamage:0 }
            };
            this.enemy = null;
            this.turnStats = { sokkouCount:0, cardsPlayed:0 };
        }

        initPlayer(spiritId) {
            let s = SPIRITS.find(x=>x.id===spiritId);
            this.player.deck = s.deck.map(id=>({...CARDS[id], id, uid:uid()}));
            this.shuffleDeck();
        }

        shuffleDeck() {
            this.player.deck = this.player.deck.sort(()=>Math.random()-0.5);
        }

        setupEnemy(enemyData) {
            this.player.hp = this.player.maxHp;

            let enemyDeck = [];
            enemyData.skills.forEach(id => {
                enemyDeck.push({...CARDS[id], id, frozen:false, uid:uid()});
                if(id !== 'shuen_kane') enemyDeck.push({...CARDS[id], id, frozen:false, uid:uid()});
            });
            enemyDeck.sort(()=>Math.random()-0.5);

            this.enemy = {
                ...enemyData,
                hp:enemyData.hp, maxHp:enemyData.hp,
                shield:0, mana:enemyData.mana,
                deck:enemyDeck, hand:[], discard:[], exile:[],
                buffs:{ spikeDamage:0 }, debuffs:{ freezeDamage:0, skillDamage:0 },
                extraActions:0
            };

            if(enemyData.id==='boss1') {
                let ki = this.enemy.deck.findIndex(c=>c.id==='shuen_kane');
                if(ki>=0) this.enemy.hand.push(this.enemy.deck.splice(ki,1)[0]);
            }

            this.turnStats = { sokkouCount:0, cardsPlayed:0 };
            this.player.buffs = { atkBonus:0, manaGainBonus:0, nextTurnDraw:0, sokkouAtkBuff:false };
            this.player.debuffs = { passDamage:0 };

            this.player.deck = [...this.player.deck, ...this.player.hand, ...this.player.discard].sort(()=>Math.random()-0.5);
            this.player.hand = [];
            this.player.discard = [];
            this.player.exile = [];

            // Apply UI_MODE to battle screen class without forcing it hidden
            let screen = document.getElementById('battle-screen');
            screen.className = `flex-1 flex flex-col bg-gradient-to-b from-slate-900 via-slate-920 to-slate-950 relative overflow-hidden ui-mode-${UI_MODE}`;
            screen.classList.remove('hidden');
        }

        drawCards(num) {
            for(let i=0;i<num;i++) {
                if(this.player.deck.length===0) {
                    this.player.deck = [...this.player.discard].sort(()=>Math.random()-0.5);
                    this.player.discard = [];
                }
                if(this.player.deck.length>0) this.player.hand.push(this.player.deck.pop());
            }
        }

        enemyDrawCards(num) {
            for(let i=0;i<num;i++) {
                if(this.enemy.deck.length===0) {
                    this.enemy.deck = [...this.enemy.discard].sort(()=>Math.random()-0.5);
                    this.enemy.discard = [];
                }
                if(this.enemy.deck.length>0) this.enemy.hand.push(this.enemy.deck.pop());
            }
        }

        damageEnemy(amt) {
            amt += this.player.buffs.atkBonus || 0;
            if(this.enemy.buffs.invincible) amt = 0;
            if(this.enemy.shield >= amt) {
                this.enemy.shield -= amt;
            } else {
                let d = amt - this.enemy.shield;
                this.enemy.shield = 0;
                this.enemy.hp -= d;
            }
            log(`<span class="text-orange-400">敵に ${amt} ダメージ！</span>`);
            ui.update();
            checkDeath();
        }

        damagePlayer(amt, pierce=false) {
            if(this.enemy && this.enemy.buffs.atkBonus) amt += this.enemy.buffs.atkBonus;
            if(this.enemy && this.enemy.buffs.haisui && this.enemy.hp <= this.enemy.maxHp/2) amt *= 2;
            let d = 0;
            if(!pierce && this.player.shield >= amt) {
                this.player.shield -= amt; d = 0;
            } else {
                d = pierce ? amt : amt - this.player.shield;
                if(!pierce) this.player.shield = 0;
                this.player.hp -= d;
            }
            if(this.enemy && this.enemy.buffs.damageToShieldActive)
                this.turnStats.enemyDamageDealt = (this.turnStats.enemyDamageDealt||0) + d;
            log(`<span class="text-red-400">プレイヤーに ${amt} ダメージ！</span>`);
            ui.update();
            checkDeath();
        }

        addMana(amt) {
            amt += this.player.buffs.manaGainBonus || 0;
            this.player.mana += amt;
            log(`<span class="text-cyan-400">マナ ${amt} 回復</span>`);
            ui.update();
        }

        useMana(amt) {
            this.player.mana = Math.max(0, this.player.mana - amt);
            ui.update();
        }

        addEnemyShield(amt) {
            this.enemy.shield += amt;
            log(`<span class="text-blue-400">敵がシールド ${amt} を得た</span>`);
            ui.update();
        }

        freezeEnemyHandCard(num) {
            let arr = this.enemy.hand.length > 0 ? this.enemy.hand : this.enemy.deck;
            let unfrozen = arr.filter(c=>!c.frozen);
            for(let i=0;i<num&&unfrozen.length>0;i++) {
                let t = unfrozen[Math.floor(Math.random()*unfrozen.length)];
                t.frozen = true; unfrozen = unfrozen.filter(c=>c!==t);
                log(`敵の『${t.name}』を凍結！`);
                if(this.enemy.debuffs.freezeDamage>0) this.damageEnemy(this.enemy.debuffs.freezeDamage);
            }
            ui.update();
        }

        unfreezeEnemyCards() {
            let count=0;
            [...this.enemy.hand,...this.enemy.deck,...this.enemy.discard].forEach(s=>{ if(s.frozen){s.frozen=false;count++;} });
            ui.update(); return count;
        }

        countEnemyFrozenCards() {
            let count=0;
            [...this.enemy.hand,...this.enemy.deck,...this.enemy.discard].forEach(s=>{ if(s.frozen)count++; });
            return count;
        }

        freezePlayerHandCard(num) {
            let unfrozen = this.player.hand.filter(c=>!(c.frozen||false));
            for(let i=0;i<num&&unfrozen.length>0;i++) {
                let t = unfrozen[Math.floor(Math.random()*unfrozen.length)];
                t.frozen = true; unfrozen = unfrozen.filter(c=>c!==t);
                log(`<span class="text-cyan-400">『${t.name}』が凍結された！</span>`);
            }
            ui.update();
        }

        addCardsToDeck(cardId, num) {
            for(let i=0;i<num;i++) this.player.deck.push({...CARDS[cardId], id:cardId, uid:uid()});
            this.shuffleDeck(); ui.update();
        }

        exileFromDeck(cardId, num) {
            let count=0;
            this.player.deck = this.player.deck.filter(c => {
                if(c.id===cardId && count<num){ this.player.exile.push(c); count++; return false; }
                return true;
            });
            log(`デッキから ${count} 枚を除外`); ui.update();
        }

        recoverFromExile(num) {
            for(let i=0;i<num;i++) {
                if(this.player.exile.length>0) {
                    let c = this.player.exile.splice(Math.floor(Math.random()*this.player.exile.length),1)[0];
                    this.player.hand.push(c);
                }
            }
            ui.update();
        }
    }

            // Hand
            let handHtml = game.player.hand.map((c,i) => {
                let cost = c.dynCost ? c.dynCost(game) : {ap:c.ap, mana:c.mana};
                let keys = c.dynKey ? c.dynKey(game) : (c.keywords||[]);
                let isSokkou = keys.includes('sokkou');
                let canPlay = game.player.mana>=cost.mana && (isSokkou||game.player.ap>=cost.ap) && !(c.frozen||false);
                let borderCls = c.frozen ? 'border-cyan-500' : (canPlay ? 'border-indigo-500' : 'border-slate-700');

                if (UI_MODE === 3 && game.player.hand.length > 0) {

                        <span class="bg-cyan-900/50 text-cyan-400 text-[9px] px-1 rounded border border-cyan-600/30">✧${cost.mana}</span>
                        ${c.isEnemy?`<span class="bg-red-900/50 text-red-400 text-[9px] px-1 rounded border border-red-600/30">敵</span>`:''}

    function buffTag(icon, label, color) {
        const cols = {red:'bg-red-900/70 text-red-300 border-red-600/30', orange:'bg-orange-900/70 text-orange-300 border-orange-600/30', yellow:'bg-yellow-900/70 text-yellow-300 border-yellow-600/30', cyan:'bg-cyan-900/70 text-cyan-300 border-cyan-600/30', blue:'bg-blue-900/70 text-blue-300 border-blue-600/30', purple:'bg-purple-900/70 text-purple-300 border-purple-600/30', slate:'bg-slate-700/70 text-slate-300 border-slate-500/30'};
        let c = cols[color]||cols.slate;
        return `<div class="${c} border text-[9px] px-1.5 py-0.5 rounded flex items-center gap-0.5 mb-0.5"><span>${icon}</span><span>${label}</span></div>`;
    }

                <div class="px-5 pt-5 pb-4 flex items-center gap-3 bg-gradient-to-b from-slate-800/80 to-slate-900/50">

    function startBattleWith(enemyId) {
        document.getElementById('enemy-select-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        let enemyData = ENEMIES.find(e=>e.id===enemyId);
        startBattle(enemyData);
    }

    function startBattle(enemyData) {
        game.setupEnemy(enemyData);
        game.player.mana = 3;
        game.turn = 1;
        game.player.shield = 0;
        document.getElementById('battle-log').innerHTML = '';
        log(`=== VS ${game.enemy.name} ===`);
        startPlayerTurn();
    }

    function startPlayerTurn() {
        // Shield carry-over: halved each turn
        game.player.shield = Math.floor(game.player.shield / 2);
        // autoShield for enemy
        if(game.enemy && game.enemy.buffs.autoShield) {
            game.enemy.shield += game.enemy.buffs.autoShield;
        }

        if(!game.turn) game.turn = 1;
        if(game.turn === 1) {
            game.player.ap = 2;
        } else {
            game.player.ap += 1;
            game.addMana(1);
        }
        if(game.player.buffs.apMinus) {
            game.player.ap = Math.max(0, game.player.ap - game.player.buffs.apMinus);
            game.player.buffs.apMinus = 0;
        }
        game.turn++;

        // Reset per-turn buffs
        game.player.buffs.sokkouAtkBuff = false;

        let drawCount = 3 - game.player.hand.length + (game.player.buffs.nextTurnDraw||0);
        game.player.buffs.nextTurnDraw = 0;
        game.drawCards(Math.max(1, drawCount));

        showBanner('PLAYER TURN');
        ui.update();
    }

    // ========================
    //  PLAY CARD
    // ========================
    function playCard(index) {
        let c = game.player.hand[index];
        if(!c || c.frozen) return;

        let cost = c.dynCost ? c.dynCost(game) : {ap:c.ap, mana:c.mana};
        let keys = c.dynKey ? c.dynKey(game) : (c.keywords||[]);
        let isSokkou = keys.includes('sokkou');

        if(game.player.mana < cost.mana) return;
        if(!isSokkou && game.player.ap < cost.ap) return;

        game.useMana(cost.mana);
        if(!isSokkou) game.player.ap -= cost.ap;

        game.turnStats.cardsPlayed++;
        if(isSokkou) game.turnStats.sokkouCount++;
        game.player.lastPlayed = c;

        log(`▶ <span class="text-indigo-300 font-semibold">${c.name}</span>を使用`);

        // 呪いダメージ
        if((game.player.debuffs.curseDamage||0) > 0) {
            game.player.hp -= game.player.debuffs.curseDamage;
            log(`☠ 呪いで ${game.player.debuffs.curseDamage} ダメージ！`);
            ui.update();
            checkDeath();
        }

        if(c.isEnemy) {
            // 敵カードをプレイヤーが使用: damageの向きを反転するプロキシ
            let proxy = new Proxy(game, {
                get(target, prop) {
                    if(prop==='damagePlayer') return (amt,pierce)=>target.damageEnemy(amt);
                    if(prop==='damageEnemy') return (amt)=>target.damagePlayer(amt);
                    if(prop==='addEnemyShield') return (amt)=>{ target.player.shield+=amt; log(`プレイヤーがシールド ${amt} を得た`); ui.update(); };
                    if(prop==='freezePlayerHandCard') return (n)=>target.freezeEnemyHandCard(n);
                    if(prop==='freezeEnemyHandCard') return (n)=>target.freezePlayerHandCard(n);
                    if(prop==='unfreezeEnemyCards') return ()=>{
                        let cnt=0; [...target.player.hand,...target.player.deck,...target.player.discard].forEach(s=>{if(s.frozen){s.frozen=false;cnt++;}});
                        ui.update(); return cnt;
                    };
                    // extraActions→プレイヤーのAPに変換
                    if(prop==='enemy') return new Proxy(target.enemy, {
                        set(t, p, v) {
                            if(p==='extraActions') { target.player.ap += Math.max(0, v - t.extraActions); }
                            t[p] = v; return true;
                        },
                        get(t,p){ return typeof t[p]==='function'?t[p].bind(t):t[p]; }
                    });
                    return typeof target[prop]==='function'?target[prop].bind(target):target[prop];
                }
            });
            c.effect(proxy);
        } else {
            c.effect(game);
        }

        // Enemy reacts
        if(game.enemy.buffs.spikeDamage>0 && game.turnStats.cardsPlayed>=2) {
            game.damagePlayer(game.enemy.buffs.spikeDamage);
        }
        if(game.enemy.debuffs.skillDamage>0) {
            game.damageEnemy(game.enemy.debuffs.skillDamage);
        }

        // sokkouAtkBuff: 即効使用時に攻撃力+2蓄積
        if(game.player.buffs.sokkouAtkBuff && isSokkou) {
            game.player.buffs.atkBonus = (game.player.buffs.atkBonus||0) + 2;
            log('⚡ 即効強化で攻撃力 +2！');
        }

        // Remove from hand
        game.player.hand.splice(index, 1);
        if(keys.includes('jogai')) {
            game.player.exile.push(c);
        } else {
            game.player.discard.push(c);
        }

        ui.update();
    }

    // ========================
    //  END TURN
    // ========================
    document.getElementById('end-turn-btn').addEventListener('click', ()=>{
        if(game.player.hp<=0) return;

        // hoji以外の手札を山札に戻す
        let held=[], returned=[];
        game.player.hand.forEach(c=>{
            let keys = c.dynKey?c.dynKey(game):(c.keywords||[]);
            keys.includes('hoji') ? held.push(c) : returned.push(c);
        });
        game.player.hand = held;
        if(returned.length>0) {
            game.player.deck.push(...returned);
            game.player.deck.sort(()=>Math.random()-0.5);
        }

        if((game.player.debuffs.passDamage||0)>0 && game.turnStats.cardsPlayed===0) {
            game.damagePlayer(game.player.debuffs.passDamage);
        }

        ui.update();
        startEnemyTurn();
    });

    // ========================
    //  ENEMY TURN
    // ========================
    async function startEnemyTurn() {
        document.getElementById('end-turn-btn').disabled = true;
        showBanner('ENEMY TURN');

        game.enemy.shield = Math.floor(game.enemy.shield / 2);
        game.enemy.buffs.invincible = false;
        game.turnStats.cardsPlayed = 0;
        game.turnStats.sokkouCount = 0;
        game.turnStats.enemyDamageDealt = 0;

        if(game.enemy.buffs.nextTurnDamageToShield) {
            game.enemy.buffs.damageToShieldActive = true;
            game.enemy.buffs.nextTurnDamageToShield = false;
        }

        if(game.turn > 2) game.enemy.mana += 1;

        let drawCount = 3 - game.enemy.hand.length + (game.enemy.buffs.nextTurnDraw||0);
        game.enemy.buffs.nextTurnDraw = 0;
        if(!game.enemy.buffs.skipNextDraw) {
            game.enemyDrawCards(Math.max(1, drawCount));
        } else {
            game.enemy.buffs.skipNextDraw = false;
        }

        ui.update();
        await new Promise(r=>setTimeout(r,900));

        let actions = 1 + game.enemy.extraActions;
        game.enemy.extraActions = 0;

        for(let a=0;a<actions;a++) {
            if(game.enemy.hp<=0 || game.enemy.buffs.uka) break;
            for(let i=0;i<game.enemy.hand.length;i++) {
                let s = game.enemy.hand[i];
                if(game.enemy.hp<=0) break;
                if(s.frozen) continue;
                if(game.enemy.mana>=s.mana && (!s.canPlay||s.canPlay(game))) {
                    game.enemy.mana -= s.mana;
                    log(`◀ <span class="text-red-300 font-semibold">${s.name}</span>を使用`);
                    if(game.enemy.buffs.oshaku && s.id!=='seirei_oshaku') {
                        game.enemy.buffs.atkBonus = (game.enemy.buffs.atkBonus||0)+2;
                    }
                    s.effect(game);
                    game.turnStats.cardsPlayed++;

                    game.enemy.hand.splice(i,1);
                    let sKeys = s.dynKey?s.dynKey(game):(s.keywords||[]);
                    if(sKeys.includes('jogai')) {
                        game.enemy.exile.push(s);
                    } else if(sKeys.includes('hoji')) {
                        game.enemy.hand.splice(i,0,s);
                        // i stays the same after splice, then i-- below will revisit → keep i
                    } else {
                        game.enemy.discard.push(s);
                    }
                    i--;

                    ui.update();
                    await new Promise(r=>setTimeout(r,900));
                    if(s.ap>0) break;
                }
            }
        }

        game.enemy.buffs.uka = false;

        if(game.enemy.buffs.damageToShieldActive) {
            game.addEnemyShield(game.turnStats.enemyDamageDealt||0);
            game.enemy.buffs.damageToShieldActive = false;
        }

        // hoji以外の敵手札を山札に戻す
        let eHeld=[], eReturned=[];
        game.enemy.hand.forEach(c=>{
            let keys = c.dynKey?c.dynKey(game):(c.keywords||[]);
            keys.includes('hoji') ? eHeld.push(c) : eReturned.push(c);
        });
        game.enemy.hand = eHeld;
        if(eReturned.length>0) {
            game.enemy.deck.push(...eReturned);
            game.enemy.deck.sort(()=>Math.random()-0.5);
        }

        if(game.player.hp>0 && game.enemy.hp>0) {
            document.getElementById('end-turn-btn').disabled = false;
            startPlayerTurn();
        }
    }

    // ========================
    //  DEATH CHECK
    // ========================
    function checkDeath() {
        if(game.player.hp<=0) {
            document.getElementById('end-title').innerText = 'GAME OVER';
            document.getElementById('end-screen').classList.remove('hidden');
        } else if(game.enemy && game.enemy.hp<=0) {
            log(`✨ <span class="text-yellow-400 font-bold">${game.enemy.name}を倒した！</span>`);
            document.getElementById('end-turn-btn').disabled = true;

            // 戦闘終了リセット
            let allCards = [...game.player.deck,...game.player.hand,...game.player.discard,...game.player.exile]
                .filter(c=>!c.isReplica);
            allCards.forEach(c=>{ c.frozen=false; });
            game.player.deck = allCards;
            game.player.hand = [];
            game.player.discard = [];
            game.player.exile = [];
            game.player.shield = 0;

            setTimeout(showReward, 900);
        }
    }

    // ========================
    //  REWARD
    // ========================
    function showReward() {
        let screen = document.getElementById('reward-screen');
        screen.classList.remove('hidden');

        let isBoss = game.stageIndex >= 7;
        document.getElementById('reward-subtitle').innerText =
            isBoss ? `BOSS CLEARED! (${game.stageIndex}/7 cleared)` : `STAGE ${game.stageIndex+1}/7 CLEARED`;

        let uniqueSkills = [...new Set([...game.enemy.deck,...game.enemy.discard,...game.enemy.hand,...game.enemy.exile].map(c=>c.id))];
        let opts = uniqueSkills.map(id=>({...CARDS[id], id}));

        let html = opts.map(s=>`
            <div onclick="takeSkill('${s.id}')" class="card-hover cursor-pointer w-44 h-60 bg-gradient-to-br from-slate-800 to-slate-900 border border-indigo-500/60 hover:border-indigo-400 rounded-xl p-3.5 flex flex-col shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                <div class="text-sm font-bold text-slate-100 mb-1.5 leading-tight">${s.name}</div>
                <div class="flex gap-1.5 mb-2.5 flex-wrap">
                    <span class="bg-yellow-900/50 text-yellow-400 text-[9px] px-1.5 rounded border border-yellow-600/30">⚡${s.ap}</span>
                    <span class="bg-cyan-900/50 text-cyan-400 text-[9px] px-1.5 rounded border border-cyan-600/30">✧${s.mana}</span>
                </div>
                <div class="text-[10px] text-slate-400 leading-snug flex-1">${s.desc}</div>
                <div class="mt-2 text-center bg-indigo-600 hover:bg-indigo-500 rounded-lg py-1.5 text-xs text-white font-bold transition-colors">Steal</div>
            </div>
        `).join('');
        document.getElementById('reward-cards').innerHTML = html;
    }

    function takeSkill(id) {
        game.player.deck.push({...CARDS[id], id, uid:uid()});
        nextStage();
    }

    document.getElementById('skip-reward-btn').addEventListener('click', nextStage);

    function nextStage() {
        document.getElementById('reward-screen').classList.add('hidden');
        game.stageIndex++;

        // 7体倒した後でボスへ
        if(game.stageIndex === 7) {
            showEnemySelectScreen(); // ボス選択
        } else if(game.stageIndex > 7 && !ENEMIES.filter(e=>e.id.startsWith('boss')).some(e=>e.id)) {
            // 全ボス倒した
            endGame();
        } else if(game.stageIndex > 9) {
            endGame();
        } else if(game.stageIndex > 7) {
            // ボス2体目
            let isBoss = game.stageIndex >= 7;
            if(isBoss) showEnemySelectScreen();
            else showEnemySelectScreen();
        } else {
            document.getElementById('end-turn-btn').disabled = false;
            showEnemySelectScreen();
        }
    }

    function endGame() {
        let et = document.getElementById('end-title');
        et.innerText = 'GAME CLEAR!!';
        et.className = 'text-7xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.7)]';
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('battle-screen').classList.add('hidden');
    }

    function showBanner(text) {
        let b = document.getElementById('turn-banner');
        document.getElementById('turn-banner-text').innerText = text;
        b.classList.remove('opacity-0');
        setTimeout(()=>b.classList.add('opacity-0'), 1400);
    }

    // ========================
    //  INIT
    // ========================
    window.onload = () => {
        let html = SPIRITS.map(s=>`
            <div onclick="startGame('${s.id}')" class="card-hover cursor-pointer w-52 glass rounded-2xl p-6 flex flex-col items-center border border-white/10 hover:border-white/30 group transition-all duration-200">
                <div class="w-16 h-16 rounded-full bg-gradient-to-br ${s.color} flex items-center justify-center text-3xl mb-4 shadow-lg group-hover:scale-110 transition-transform duration-200">${s.icon}</div>
                <h3 class="text-lg font-black text-white mb-1">${s.name}</h3>
                <p class="text-[11px] text-slate-500 text-center leading-snug mb-4">${s.desc}</p>
                <div class="w-full text-center bg-white/5 hover:bg-white/10 border border-white/10 text-slate-400 hover:text-white text-xs py-1.5 rounded-lg transition-all">選択する</div>
            </div>
        `).join('');
        document.getElementById('spirits-container').innerHTML = html;

        // Progress dots (for later use)
        let dots = '';
        for(let i=0;i<9;i++) dots+=`<div class="w-1.5 h-1.5 rounded-full bg-slate-700" id="dot-${i}"></div>`;
        const progressDots = document.getElementById('progress-dots');
        if(progressDots) progressDots.innerHTML = dots;

        // Log Popup Toggle Event Listeners (for UI 3)
        const logToggleBtn = document.getElementById('log-toggle-btn');
        const logCloseBtn = document.getElementById('log-close-btn');
        const logContainer = document.getElementById('battle-log-container');
        
        if (logToggleBtn && logContainer) {
            logToggleBtn.addEventListener('click', () => {
                logContainer.classList.toggle('log-open');
            });
        }
        if (logCloseBtn && logContainer) {
            logCloseBtn.addEventListener('click', () => {
                logContainer.classList.remove('log-open');
            });
        }
    };
</script>
</body>
</html>
